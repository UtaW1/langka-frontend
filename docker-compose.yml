services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - app
    networks:
      - langka_net

  frontend:
    image: kuulz/langka-frontend:1.0.0
    container_name: frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - langka_net

  app:
    image: kuulz/langka-order-management:1.1.3
    container_name: app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"
    networks:
      - langka_net

  postgres:
    image: postgres:16-alpine
    container_name: langka-postgres-16
    env_file: .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - langka_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  langka_net:
    driver: bridge
